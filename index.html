<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startpage</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

  <div class="bg-overlay" id="bgOverlay"></div>

  <nav class="top-bar">
    <button id="addonBtn"    class="icon-btn" aria-label="Addons"    title="Manage Addons">
      <span class="material-symbols-outlined">extension</span>
    </button>
    <button id="settingsBtn" class="icon-btn" aria-label="Settings"  title="Configure Settings">
      <span class="material-symbols-outlined">settings</span>
    </button>
  </nav>

  <main class="app-container">

    <header class="header">
      <h1 id="timeDisplay" class="time">00:00</h1>
      <p  id="greeting"    class="greeting">Welcome</p>
    </header>

    <div class="search-card glass-card">
      <button id="engineBtn" class="engine-btn" title="Change Engine" aria-label="Change search engine">
        <img id="engineIcon" class="engine-icon" src="" alt="Engine icon">
      </button>
      <input id="searchInput" class="search-input" type="text" placeholder="Search…" autocomplete="off">
      <button id="searchGoBtn" class="icon-btn go-btn" aria-label="Search" title="Execute Search">
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>

    <div id="shortcutsContainer" class="shortcuts-grid"></div>

  </main>


  <!-- Shortcut Modal -->
  <div id="shortcutModal" class="modal hidden" data-modal="shortcut">
    <div class="modal-content glass-card">
      <h3 id="shortcutModalTitle">Add Shortcut</h3>
      <input type="hidden" id="shortcutEditIdx" value="-1">
      <input type="text"   id="shortcutName"    class="modal-input" placeholder="Name">
      <input type="url"    id="shortcutUrl"     class="modal-input" placeholder="https://example.com">
      <div class="modal-actions">
        <button id="shortcutDeleteBtn" class="btn-danger icon-only hidden" aria-label="Delete shortcut" title="Delete Shortcut">
          <span class="material-symbols-outlined">delete</span>
        </button>
        <div class="spacer"></div>
        <button id="shortcutSaveBtn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>


  <!-- Engine Modal -->
  <div id="engineModal" class="modal hidden" data-modal="engine">
    <div class="modal-content glass-card modal-lg">
      <h3>Search Engines</h3>
      <div id="engineList" class="engine-list"></div>
      <div class="form-section">
        <h4 id="engineFormTitle">Add New Engine</h4>
        <input type="hidden" id="engineEditIdx" value="-1">
        <input type="text"   id="engineName"    class="modal-input" placeholder="Name">
        <input type="text"   id="engineUrl"     class="modal-input" placeholder="URL (%s for query)">
        <button id="engineSaveBtn" class="btn-primary full-width">Add Engine</button>
      </div>
    </div>
  </div>


  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden" data-modal="settings">
    <div class="modal-content glass-card modal-lg">
      <h3>Settings</h3>

      <div class="settings-section">
        <label class="settings-label">Clock</label>
        <div class="settings-row">
          <label>Show Seconds</label>
          <label class="toggle">
            <input type="checkbox" id="settingShowSec">
            <span class="track"></span>
          </label>
        </div>
        <div class="settings-row">
          <label>24-hour Format</label>
          <label class="toggle">
            <input type="checkbox" id="setting24hr">
            <span class="track"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <label class="settings-label">Navigation</label>
        <div class="settings-row">
          <label>Open links in new tab</label>
          <label class="toggle">
            <input type="checkbox" id="settingNewTab">
            <span class="track"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <label class="settings-label">Wallpaper</label>
        <div class="wallpaper-row">
          <input type="text" id="bgUrlInput"  class="modal-input" placeholder="https://image.url…">
          <label for="bgFileInput" class="file-btn glass-control" title="Pick file" aria-label="Upload image">
            <span class="material-symbols-outlined">folder_open</span>
          </label>
          <input type="file" id="bgFileInput" hidden>
        </div>
        <button id="resetBgBtn" class="btn-danger small-btn">Reset Gradient</button>
      </div>
    </div>
  </div>


  <script type="module" src="app.js"></script>
</body>
</html>
