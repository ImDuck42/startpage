<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Startpage</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <div class="bg-overlay" id="bgOverlay"></div>

    <!-- Settings Button -->
    <div class="top-bar">
        <button id="settingsBtn" class="icon-btn" aria-label="Settings">
            <span class="material-symbols-outlined">settings</span>
        </button>
    </div>

    <main class="app-container">
        
        <header class="header-section">
            <h1 id="timeDisplay" class="time-display">00:00</h1>
            <p id="greeting" class="greeting-text">Welcome</p>
        </header>

        <!-- Search Bar -->
        <div class="search-card glass-card">
            <button class="engine-selector-btn" id="engineBtn" title="Change Engine" aria-label="Change search engine">
                <img id="engineIcon" src="" class="engine-icon" alt="Engine icon">
            </button>
            <input type="text" id="searchInput" class="search-input" placeholder="Search..." autocomplete="off">
            <button id="searchGoBtn" class="icon-btn search-go-btn" aria-label="Search">
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>

        <!-- Shortcuts Grid -->
        <div class="shortcuts-grid" id="shortcutsContainer">
            <!-- Generated by JS -->
        </div>

    </main>

    <!-- Modals -->
    <div id="shortcutModal" class="modal hidden" data-modal="shortcut">
        <div class="modal-content glass-card">
            <h3 id="shortcutModalTitle">Add Shortcut</h3>
            <input type="hidden" id="shortcutEditIndex" value="-1">
            <input type="text" id="shortcutName" class="modal-input" placeholder="Name">
            <input type="url" id="shortcutUrl" class="modal-input" placeholder="https://example.com">
            <div class="modal-actions">
                <button id="shortcutDeleteBtn" class="danger icon-only-btn hidden" aria-label="Delete">
                    <span class="material-symbols-outlined">delete</span>
                </button>
                <div class="spacer"></div>
                <button class="primary" id="shortcutSaveBtn">Save</button>
            </div>
        </div>
    </div>

    <div id="engineModal" class="modal hidden" data-modal="engine">
        <div class="modal-content glass-card large-modal">
            <h3>Search Engines</h3>
            <div class="engine-list" id="engineList"></div>
            <div class="engine-form-section">
                <h4 id="engineFormTitle">Add New Engine</h4>
                <input type="hidden" id="engineEditIndex" value="-1">
                <input type="text" id="engineName" class="modal-input" placeholder="Name">
                <input type="text" id="engineUrl" class="modal-input" placeholder="URL (%s for query)">
                <button id="engineSaveBtn" class="primary full-width">Add Engine</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal hidden" data-modal="settings">
        <div class="modal-content glass-card">
            <h3>Settings</h3>
            
            <div class="settings-section">
                <label class="settings-title">Clock Preferences</label>
                <div class="settings-row">
                    <label>Show Seconds</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="settingShowSeconds">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-row">
                    <label>24-hour Format</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting24Hour">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="settings-section">
                <label class="settings-title">Wallpaper</label>
                <div class="wallpaper-controls">
                    <input type="text" id="bgUrlInput" class="modal-input" placeholder="https://image.url...">
                    <label for="bgFileInput" class="file-btn glass-control" title="Pick File" aria-label="Upload image">
                        <span class="material-symbols-outlined">folder_open</span>
                    </label>
                    <input type="file" id="bgFileInput" hidden>
                </div>
                <button id="resetBgBtn" class="danger small-btn mt-10">Reset Gradient</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
